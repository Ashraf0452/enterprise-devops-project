services:

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      auth-service:
        condition: service_started
      account-service:
        condition: service_started
      payment-service:
        condition: service_started
    networks:
      - devops-net

  auth-service:
    image: ashraf0452/auth-service:latest
    ports:
      - "4000:4000"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: banking
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devops-net

  account-service:
    image: ashraf0452/auth-service:latest
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: banking
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-net

  payment-service:
    image: ashraf0452/auth-service:latest
    ports:
      - "6000:6000"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: banking
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-net

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: banking
    ports:
      - "5432:5432"
    networks:
      - devops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - devops-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - devops-net

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - devops-net

networks:
  devops-net:
