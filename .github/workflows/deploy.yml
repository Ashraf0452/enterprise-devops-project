name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build Auth Service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest ./services/auth-service


      - name: Build Account Service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/account-service:latest ./services/account-service


      - name: Build Payment Service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/payment-service:latest ./services/payment-service


      - name: Push Auth Service
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest


      - name: Push Account Service
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/account-service:latest


      - name: Push Payment Service
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/payment-service:latest


      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/enterprise-devops-project
            docker compose pull
            docker compose up -d
